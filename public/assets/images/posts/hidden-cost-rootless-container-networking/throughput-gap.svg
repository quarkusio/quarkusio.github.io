<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <style>
    .title { font: bold 26px 'Open Sans', Arial, sans-serif; fill: #121212; }
    .subtitle { font: italic 14px 'Open Sans', Arial, sans-serif; fill: #121212; }
    .env-label { font: bold 15px 'Open Sans', Arial, sans-serif; fill: #121212; }
    .fw-label { font: 14px 'Open Sans', Arial, sans-serif; fill: #121212; }
    .tps-value { font: bold 18px 'Open Sans', Arial, sans-serif; fill: #121212; }
    .ratio-label { font: bold 16px 'Open Sans', Arial, sans-serif; fill: #666; }
    .scale-text { font: 10px 'Open Sans', Arial, sans-serif; fill: #aaa; }
    .scale-line { stroke: #ddd; stroke-width: 1; }
  </style>

  <!-- Background -->
  <rect width="900" height="340" fill="white"/>

  <!-- Title -->
  <text x="20" y="38" class="title">Throughput</text>
  <text x="20" y="58" class="subtitle">(Higher is better)</text>

  <!-- Scale lines and labels - max ~26000, bar area starts at x=200, width=540 -->
  <!-- 5k marks -->
  <line x1="304" y1="68" x2="304" y2="290" class="scale-line" stroke-dasharray="4,4"/>
  <line x1="408" y1="68" x2="408" y2="290" class="scale-line" stroke-dasharray="4,4"/>
  <line x1="512" y1="68" x2="512" y2="290" class="scale-line" stroke-dasharray="4,4"/>
  <line x1="616" y1="68" x2="616" y2="290" class="scale-line" stroke-dasharray="4,4"/>
  <line x1="720" y1="68" x2="720" y2="290" class="scale-line" stroke-dasharray="4,4"/>

  <text x="296" y="305" class="scale-text">5k</text>
  <text x="398" y="305" class="scale-text">10k</text>
  <text x="502" y="305" class="scale-text">15k</text>
  <text x="606" y="305" class="scale-text">20k</text>
  <text x="710" y="305" class="scale-text">25k</text>

  <!-- === Local Fedora workstation === -->
  <text x="16" y="92" class="env-label">Local Fedora</text>
  <text x="16" y="108" class="fw-label" style="fill:#666;">workstation</text>

  <!-- Quarkus bar - 15504 TPS, scale: 15504/26000*540 = 322 -->
  <text x="130" y="135" class="fw-label">Quarkus</text>
  <rect x="200" y="118" width="322" height="28" rx="3" fill="#4695EB"/>
  <text x="530" y="139" class="tps-value">15,504</text>

  <!-- Spring bar - 13062 TPS, scale: 13062/26000*540 = 271 -->
  <text x="108" y="171" class="fw-label">Spring Boot</text>
  <rect x="200" y="154" width="271" height="28" rx="3" fill="#C3E1B4"/>
  <text x="479" y="175" class="tps-value">13,062</text>

  <!-- Ratio -->
  <text x="820" y="155" class="ratio-label">1.19x</text>

  <!-- === Perf-lab (RHEL 9.6) === -->
  <text x="16" y="218" class="env-label">Perf-lab</text>
  <text x="16" y="234" class="fw-label" style="fill:#666;">(RHEL 9.6)</text>

  <!-- Quarkus bar - 24472 TPS, scale: 24472/26000*540 = 508 -->
  <text x="130" y="261" class="fw-label">Quarkus</text>
  <rect x="200" y="244" width="508" height="28" rx="3" fill="#4695EB"/>
  <text x="716" y="265" class="tps-value">24,472</text>

  <!-- Spring bar - 11783 TPS, scale: 11783/26000*540 = 245 -->
  <text x="108" y="297" class="fw-label">Spring Boot</text>
  <rect x="200" y="280" width="245" height="28" rx="3" fill="#C3E1B4"/>
  <text x="453" y="301" class="tps-value">11,783</text>

  <!-- Ratio -->
  <text x="820" y="281" class="ratio-label">2.08x</text>

  <!-- Ratio column header -->
  <text x="810" y="92" class="env-label" style="fill:#888;">Ratio</text>

  <!-- Separator line -->
  <line x1="16" y1="195" x2="870" y2="195" stroke="#e0e0e0" stroke-width="1"/>
</svg>
