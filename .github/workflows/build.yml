name: Build

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 5000
          fetch-tags: false

      - name: Detect site generator
        id: detect
        run: |
          if [ -f "Gemfile" ]; then
            echo "jekyll=true" >> $GITHUB_OUTPUT
            echo "site_dir=_site" >> $GITHUB_OUTPUT
            echo "statics_dir=." >> $GITHUB_OUTPUT
          else
            echo "jekyll=false" >> $GITHUB_OUTPUT
          fi
          if [ -d "src/main" ]; then
            echo "roq=true" >> $GITHUB_OUTPUT
            echo "site_dir=target/roq" >> $GITHUB_OUTPUT
            echo "statics_dir=public" >> $GITHUB_OUTPUT
          else
            echo "roq=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up ruby
        if: steps.detect.outputs.jekyll == 'true'
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: 3.2.3

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Ruby gems
        if: steps.detect.outputs.jekyll == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - name: Cache npm packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pom.xml') }}

      # git restore-mtime is currently broken in the GH Actions images so using our own updated local copy
      # see https://github.com/MestreLion/git-tools/blob/main/git-restore-mtime
      - name: Restore mtime
        run: ./tools/git-restore-mtime

      - name: Install Ruby dependencies
        if: steps.detect.outputs.jekyll == 'true'
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build Jekyll site
        if: steps.detect.outputs.jekyll == 'true'
        run: bundle exec jekyll build --future --config _config.yml,_only_latest_guides_config.yml

      - name: Build with Maven
        if: steps.detect.outputs.roq == 'true'
        run: QUARKUS_ROQ_GENERATOR_BATCH=true mvn -B package quarkus:run -DskipTests # for now, for parity, we need to stand up a test server to run tests

      - name: Compile tests
        run: mvn -B test-compile

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mvn exec:java -e -Dexec.classpathScope=test -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps --only-shell chromium"

      # Jekyll serve handles extensionless URLs (e.g. /guides/getting-started)
      # the same way GitHub Pages does; a plain HTTP server would 404 on them.
      - name: Start Jekyll test server
        if: steps.detect.outputs.jekyll == 'true'
        run: |
          bundle exec jekyll serve --port 8090 --no-watch --skip-initial-build &
          timeout 30 bash -c 'until curl -s http://localhost:8090 > /dev/null 2>&1; do sleep 0.5; done'

      - uses: jbangdev/setup-jbang@main
        if: steps.detect.outputs.roq == 'true'

      - name: Start Java test server
        if: steps.detect.outputs.roq == 'true'
        run: |
          jbang trust add https://repo1.maven.org/maven2/io/quarkiverse/roq/quarkus-roq-cli/
          jbang roq@quarkiverse/quarkus-roq serve target/roq/ -p 8090 &

      - name: Run smoke tests
        run: mvn -B test -Dtest.url=http://localhost:8090
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: 1

      - name: Determine link checker scope
        id: link_scope
        run: |
          # If build infrastructure or the link checker itself changed, run a full check
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            INFRA_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- \
              .github/workflows/build.yml \
              pom.xml \
              src/test/java/ 2>/dev/null || true)
          else
            INFRA_CHANGED="not-a-pr"
          fi

          if [ -n "$INFRA_CHANGED" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Infrastructure files changed, running full link check"
            exit 0
          fi

          # Compare the built site to what is currently deployed on gh-pages.
          # Use --filter=blob:none so only tree objects are fetched initially,
          # then sparse-checkout to materialise just *.html files for rsync.
          git fetch origin gh-pages --filter=blob:none 2>/dev/null || {
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Could not fetch gh-pages, running full link check"
            exit 0
          }

          git worktree add --detach /tmp/gh-pages origin/gh-pages 2>/dev/null || {
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Could not check out gh-pages, running full link check"
            exit 0
          }

          git -C /tmp/gh-pages sparse-checkout set --no-cone '*.html'

          RSYNC_OUT=$(rsync -rcn --out-format='%n' \
            --include='*/' --include='*.html' --exclude='*' \
            ${{ steps.detect.outputs.site_dir }}/ /tmp/gh-pages/ 2>/dev/null) || {
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "Site comparison failed, running full link check"
            git worktree remove /tmp/gh-pages 2>/dev/null || true
            exit 0
          }

          # Filter out version/main/ guides — these are synced daily from the
          # quarkus repo and will almost always differ from gh-pages, but are
          # not part of the PR's changes.
          CHANGED=$(echo "$RSYNC_OUT" | grep '\.html$' | grep -v '^version/main/' || true)

          git worktree remove /tmp/gh-pages 2>/dev/null || true

          if [ -z "$CHANGED" ]; then
            echo "mode=skip" >> $GITHUB_OUTPUT
            echo "No HTML files changed, skipping link crawl"
            exit 0
          fi

          COUNT=$(echo "$CHANGED" | wc -l | tr -d ' ')
          echo "$COUNT changed HTML file(s)"
          echo "$CHANGED" | sed 's|/[^/]*$||' | sort | uniq -c | sort -rn | head -20

          if [ "$COUNT" -gt 200 ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "More than 200 files changed, running full link check"
          else
            PATHS=$(echo "$CHANGED" | sed 's|index\.html$||; s|^|/|' | tr '\n' ',' | sed 's/,$//')
            echo "mode=partial" >> $GITHUB_OUTPUT
            echo "paths=$PATHS" >> $GITHUB_OUTPUT
            echo "Targeted check: $PATHS"
          fi

      - name: Run Lighthouse CI
        if: steps.link_scope.outputs.mode != 'skip'
        run: |
          npm ci
          URLS=""
          if [ "${{ steps.link_scope.outputs.mode }}" = "partial" ]; then
            IFS=',' read -ra PATHS <<< "${{ steps.link_scope.outputs.paths }}"
            for p in "${PATHS[@]:0:5}"; do
              URLS="$URLS --collect.url=http://localhost:8090${p}"
            done
          else
            URLS="--collect.url=http://localhost:8090/ --collect.url=http://localhost:8090/guides/ --collect.url=http://localhost:8090/blog/"
          fi
          npx lhci autorun $URLS
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # Versioned guides (2.x-5.x) are excluded from this build by
      # _only_latest_guides_config.yml, so skip crawling those paths.
      - name: Run link crawler
        if: steps.link_scope.outputs.mode != 'skip'
        run: |
          CHANGED_PATHS_ARG=""
          if [ "${{ steps.link_scope.outputs.mode }}" = "partial" ]; then
            CHANGED_PATHS_ARG="-Dtest.crawl.changed-paths=${{ steps.link_scope.outputs.paths }}"
          fi
          mvn -B test -Pe2e -Dtest.url=http://localhost:8090 \
            -Dtest.crawl.check-external=false \
            -Dtest.crawl.exclude-paths=/version/2,/version/3,/version/4,/version/5,/version/main \
            $CHANGED_PATHS_ARG
        env:
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: 1

      - name: Upload build reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: "build-reports-${{ github.run_attempt }}-Build"
          path: |
            target/*-reports/TEST-*.xml
            target/build-report.json
            .lighthouseci/
            README.md
          retention-days: 2

      - name: Lighthouse report
        if: always()
        run: |
          {
            echo "### Lighthouse Results"
            echo ""
            echo "| Page | Performance | Accessibility | Best Practices | SEO | Report |"
            echo "|------|:----------:|:------------:|:--------------:|:---:|--------|"
            for f in .lighthouseci/lhr-*.json; do
              [ -f "$f" ] || continue
              url=$(jq -r '.requestedUrl' "$f")
              path=$(echo "$url" | sed 's|http://[^/]*||')
              perf=$(jq '.categories.performance.score // 0' "$f" | awk '{printf "%d", $1 * 100}')
              a11y=$(jq '.categories.accessibility.score // 0' "$f" | awk '{printf "%d", $1 * 100}')
              bp=$(jq '.categories["best-practices"].score // 0' "$f" | awk '{printf "%d", $1 * 100}')
              seo=$(jq '.categories.seo.score // 0' "$f" | awk '{printf "%d", $1 * 100}')
              perf_icon=$( [ "$perf" -ge 90 ] && echo ":green_circle:" || ( [ "$perf" -ge 50 ] && echo ":orange_circle:" || echo ":red_circle:" ) )
              a11y_icon=$( [ "$a11y" -ge 90 ] && echo ":green_circle:" || ( [ "$a11y" -ge 50 ] && echo ":orange_circle:" || echo ":red_circle:" ) )
              bp_icon=$( [ "$bp" -ge 90 ] && echo ":green_circle:" || ( [ "$bp" -ge 50 ] && echo ":orange_circle:" || echo ":red_circle:" ) )
              seo_icon=$( [ "$seo" -ge 90 ] && echo ":green_circle:" || ( [ "$seo" -ge 50 ] && echo ":orange_circle:" || echo ":red_circle:" ) )
              link=""
              if [ -f .lighthouseci/links.json ]; then
                report_url=$(jq -r --arg u "$url" '.[$u] // empty' .lighthouseci/links.json)
                [ -n "$report_url" ] && link="[Full report](${report_url})"
              fi
              echo "| \`${path:-/}\` | ${perf_icon} ${perf} | ${a11y_icon} ${a11y} | ${bp_icon} ${bp} | ${seo_icon} ${seo} | ${link} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test report
        if: always()
        run: |
          {
            echo "### Test Results"
            echo ""
            echo "| Suite | Tests | Passed | Failed | Skipped | Time |"
            echo "|-------|------:|-------:|-------:|--------:|-----:|"
            for f in target/surefire-reports/TEST-*.xml; do
              [ -f "$f" ] || continue
              suite=$(sed -n 's/.*name="\([^"]*\).*/\1/p' "$f" | head -1)
              tests=$(sed -n 's/.*tests="\([^"]*\).*/\1/p' "$f" | head -1)
              fail=$(sed -n 's/.*failures="\([^"]*\).*/\1/p' "$f" | head -1)
              err=$(sed -n 's/.*errors="\([^"]*\).*/\1/p' "$f" | head -1)
              skip=$(sed -n 's/.*skipped="\([^"]*\).*/\1/p' "$f" | head -1)
              time=$(sed -n 's/.*time="\([^"]*\).*/\1/p' "$f" | head -1)
              pass=$((tests - ${fail:-0} - ${err:-0} - ${skip:-0}))
              icon=$( [ "${fail:-0}" -gt 0 ] || [ "${err:-0}" -gt 0 ] && echo ":x:" || echo ":white_check_mark:" )
              echo "| ${icon} ${suite##*.} | $tests | $pass | $((${fail:-0} + ${err:-0})) | ${skip:-0} | ${time}s |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Store PR id
        run: echo ${{ github.event.number }} > ./${{ steps.detect.outputs.site_dir }}/pr-id.txt

      - name: Reduce the size of the website to be compatible with surge
        run: |
          SITE_DIR="${{ steps.detect.outputs.site_dir }}"
          STATICS_DIR="${{ steps.detect.outputs.statics_dir }}"
          find "$STATICS_DIR"/assets/images/posts/ -mindepth 1 -maxdepth 1 -type d -mtime +50 -exec rm -rf "$SITE_DIR"/{} \;
          find "$STATICS_DIR"/newsletter/ -mindepth 1 -maxdepth 1 -type d -mtime +50 -exec rm -rf "$SITE_DIR"/{} \;
          rm -rf "$SITE_DIR"/assets/stickers
          rm -rf "$SITE_DIR"/assets/images/worldtour/2023
          rm -rf "$SITE_DIR"/assets/images/worldtour/2024
          rm -rf "$SITE_DIR"/assets/images/desktopwallpapers
          rm -rf "$SITE_DIR"/assets/images/stickers

      - name: Publishing directory for PR preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: ./${{ steps.detect.outputs.site_dir }}
          retention-days: 3

  build-report:
    runs-on: ubuntu-latest
    name: Build report
    needs: [build]
    if: always()
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: build-reports-artifacts
          pattern: "build-reports-${{ github.run_attempt }}-*"
      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 25
      - name: Produce report and add it as job summary
        uses: quarkusio/action-build-reporter@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-reports-artifacts-path: build-reports-artifacts
